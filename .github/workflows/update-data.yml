name: Update Weverse Preorder Data

on:
  schedule:
    # 매일 아침 8시 (한국시간) = UTC 23:00 (전날)
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run data collector
        env:
          WEVERSE_REFRESH_TOKEN: ${{ secrets.WEVERSE_REFRESH_TOKEN }}
        run: node scripts/collect-data.mjs

      - name: Check if data changed
        id: check
        run: |
          if git diff --quiet public/data/weverse-preorder-data.json scripts/token.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "데이터 변경 없음"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "데이터 변경 감지!"
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/weverse-preorder-data.json
          git add scripts/token.json
          git commit -m "자동 업데이트: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M')"
          git push
